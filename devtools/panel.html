<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>a11y Panel</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>

<!-- ══════════ TOP BAR ══════════ -->
<div class="topbar">
  <div class="topbar-left">
    <button id="btn-scan" class="btn btn-primary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" y1="6" x2="20" y2="6" />
        <circle cx="9" cy="6" r="2" />
        <line x1="4" y1="12" x2="20" y2="12" />
        <circle cx="15" cy="12" r="2" />
        <line x1="4" y1="18" x2="20" y2="18" />
        <circle cx="11" cy="18" r="2" />
      </svg>
      Setup Scan
    </button>
    <button id="btn-picker" class="btn" title="Pick an element from the page to scan">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 3l14 8-6 2-2 6z"/><path d="M14 14l4 4"/></svg>
      Pick Element
    </button>
    <button id="btn-export" class="btn" disabled>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export JSON
    </button>
  </div>

  <div class="topbar-right">
    <div class="score-and-filter">
      <div class="score-chip">
        <span class="score-chip-label">Score</span>
        <span id="score-display" class="score-chip-value">—</span>
        <span id="grade-display" class="score-chip-grade"></span>
      </div>
      <input id="search" type="search" placeholder="Search issues…" class="search-input">
      <select id="filter-impact" class="select">
        <option value="">All impacts</option>
        <option value="critical">Critical</option>
        <option value="serious">Serious</option>
        <option value="moderate">Moderate</option>
        <option value="minor">Minor</option>
      </select>
    </div>
    <div class="counters">
      <span class="counter critical" id="nav-critical">
        <span class="dot"></span><span id="c-critical">0</span> Critical
      </span>
      <span class="counter serious" id="nav-serious">
        <span class="dot"></span><span id="c-serious">0</span> Serious
      </span>
      <span class="counter moderate" id="nav-moderate">
        <span class="dot"></span><span id="c-moderate">0</span> Moderate
      </span>
      <span class="counter minor" id="nav-minor">
        <span class="dot"></span><span id="c-minor">0</span> Minor
      </span>
    </div>
  </div>
</div>

<!-- ══════════ PICKER SCOPE BAR ══════════ -->
<div id="picker-scope-bar" class="picker-scope-bar hidden">
  <span class="picker-scope-icon">⚡</span>
  <div class="picker-scope-info">
    <span class="picker-scope-label">Scanning:</span>
    <code id="picker-scope-selector" class="picker-scope-selector"></code>
    <span id="picker-scope-reason" class="picker-scope-reason"></span>
  </div>
  <div class="picker-scope-actions">
    <button id="btn-scope-scan" class="btn btn-small btn-scope-scan btn-primary" title="Run scan on the current scope">⚡ Scan Scope</button>
    <button id="btn-scope-scan-el" class="btn btn-small btn-primary" title="Run scan on the selected element">⚡ Scan Element</button>
    <button id="btn-scope-clear" class="btn btn-small" title="Cancel selection">✕</button>
  </div>
</div>

<!-- ══════════ SCAN TARGET BAR ══════════ -->
<div id="scan-target-bar" class="scan-target-bar hidden">
  <span class="scan-target-icon">🎯</span>
  <span class="scan-target-label">Scanned:</span>
  <code id="scan-target-selector" class="scan-target-selector"></code>
  <button id="btn-clear-target" class="btn btn-small" title="Clear scoped scan and return to full page">✕ Clear</button>
</div>

<!-- ══════════ TAB BAR ══════════ -->
<div class="tabs">
  <button class="tab active" data-tab="violations">Violations</button>
  <button class="tab"        data-tab="passes">Passes</button>
  <button class="tab"        data-tab="incomplete">Incomplete</button>
</div>

<!-- ══════════ MAIN SPLIT ══════════ -->
<div class="main-split">

  <!-- Left: Issue list -->
  <div class="sidebar" id="sidebar">
    <div id="empty-state" class="empty-state">
      <div class="empty-icon">
        <img src="../icons/icon128.png" alt="a11y DevTools Logo">
      </div>
      <p>Run a scan to see accessibility results</p>
    </div>
    <div id="issue-list"></div>
  </div>

  <!-- Resize handle -->
  <div class="resize-handle" id="resize-handle"></div>

  <!-- Right: Detail panel -->
  <div class="detail-panel" id="detail-panel">
    <div id="detail-placeholder" class="detail-placeholder">
      <p>Select an issue from the list to see details</p>
    </div>
    <div id="detail-content" class="hidden"></div>
  </div>

</div>

<!-- ══════════ STATUS BAR ══════════ -->
<div class="statusbar" id="statusbar">Ready</div>

<!-- ══════════ SCAN RULES MODAL ══════════ -->
<div id="scan-modal" class="scan-modal hidden" role="dialog" aria-modal="true" aria-labelledby="scan-modal-title">
  <div class="scan-modal-panel">
    <div class="scan-modal-header">
      <h2 id="scan-modal-title">Select Rules To Scan</h2>
      <div class="btn-group">
        <button id="btn-enter-custom-mode" class="btn" type="button">Custom Mode</button>
        <button id="btn-back-to-presets" class="btn hidden" type="button">Back To Presets</button>
        <button id="btn-scan-modal-close" class="btn" type="button" aria-label="Close">✕</button>
      </div>
    </div>

    <div id="scan-modal-controls" class="scan-modal-controls">
      <input id="rules-search" type="search" class="search-input" placeholder="Search rules or tags...">
      <select id="scan-filter-type" class="select">
        <option value="rule">Filter by rules</option>
        <option value="tag">Filter by tags</option>
      </select>
      <select id="rules-tag-filter" class="select">
        <option value="">All tags</option>
      </select>
      <button id="btn-rules-select-all" class="btn" type="button">Select All</button>
      <button id="btn-rules-clear-all" class="btn" type="button">Clear</button>
    </div>

    <div id="scan-modal-presets" class="scan-modal-presets">
      <div class="preset-header">
        <span class="preset-label">Recommended presets</span>
      </div>
      <span id="preset-help" class="preset-help"></span>
      <div id="scan-preset-list" class="preset-list"></div>
    </div>

    <div class="scan-modal-summary">
      <span id="rules-count">0 selected</span>
    </div>

    <div id="rules-list" class="rules-list"></div>

    <div class="scan-modal-footer">
      <button id="btn-scan-cancel" class="btn" type="button">Cancel</button>
      <button id="btn-scan-run-selected" class="btn btn-primary" type="button">Run Scan</button>
    </div>
  </div>
</div>

<script src="../shared/messaging.js"></script>
<script src="../core/scoring.js"></script>
<script src="../core/formatter.js"></script>
<script src="panel.js"></script>
</body>
</html>
