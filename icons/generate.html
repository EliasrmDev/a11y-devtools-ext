<script>
async function loadSvgImage(svgText) {
  const blob = new Blob([svgText], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);

  try {
    const img = new Image();
    img.src = url;
    await img.decode();
    return img;
  } finally {
    URL.revokeObjectURL(url);
  }
}

async function makeIcon(size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');

  const svgText = `
    <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="8.5" stroke="#5b8dee" stroke-width="2"/>
      <circle cx="12" cy="9.2" r="1.8" fill="#5b8dee"/>
      <path d="M10.2 12.5h3.6M12 12.5v4.5" stroke="#5b8dee" stroke-width="1.9" stroke-linecap="round"/>
      <line x1="18.5" y1="18.5" x2="25" y2="25" stroke="#5b8dee" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
  `;

  const img = await loadSvgImage(svgText);
  ctx.drawImage(img, 0, 0, size, size);

  document.body.appendChild(c);
}

[16, 48, 128].forEach(makeIcon);
</script>
