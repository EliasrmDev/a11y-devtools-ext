<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>a11y DevTools</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="logo">
      <span class="logo-icon">♿</span>
      <span class="logo-text">a11y DevTools</span>
    </div>
    <button id="btn-scan" class="btn-primary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Run Scan
    </button>
  </header>

  <div id="state-idle" class="state">
    <div class="idle-icon">♿</div>
    <p class="idle-text">Click <strong>Run Scan</strong> to analyze accessibility</p>
  </div>

  <div id="state-loading" class="state hidden">
    <div class="spinner"></div>
    <p>Analyzing page…</p>
  </div>

  <div id="state-error" class="state hidden">
    <div class="error-icon">⚠</div>
    <p id="error-msg">An error occurred.</p>
  </div>

  <div id="state-results" class="state hidden">
    <div class="score-row">
      <div class="score-ring-wrap">
        <svg class="score-ring" viewBox="0 0 60 60">
          <circle class="ring-bg" cx="30" cy="30" r="24"/>
          <circle id="ring-progress" class="ring-progress" cx="30" cy="30" r="24"
            stroke-dasharray="150.8" stroke-dashoffset="150.8"/>
        </svg>
        <div class="score-inner">
          <span id="score-value">--</span>
          <span id="score-grade" class="grade">-</span>
        </div>
      </div>
      <div class="score-breakdown">
        <div class="bd-row critical"><span class="dot"></span><span class="lbl">Critical</span><span id="cnt-critical" class="cnt">0</span></div>
        <div class="bd-row serious" ><span class="dot"></span><span class="lbl">Serious</span> <span id="cnt-serious"  class="cnt">0</span></div>
        <div class="bd-row moderate"><span class="dot"></span><span class="lbl">Moderate</span><span id="cnt-moderate" class="cnt">0</span></div>
        <div class="bd-row minor"   ><span class="dot"></span><span class="lbl">Minor</span>   <span id="cnt-minor"    class="cnt">0</span></div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-box">
        <span id="stat-violations" class="stat-num">0</span>
        <span class="stat-lbl">Violations</span>
      </div>
      <div class="stat-box">
        <span id="stat-passes" class="stat-num pass">0</span>
        <span class="stat-lbl">Passes</span>
      </div>
      <div class="stat-box">
        <span id="stat-incomplete" class="stat-num warn">0</span>
        <span class="stat-lbl">Incomplete</span>
      </div>
    </div>

    <div class="url-row" id="scan-url"></div>
    <div class="time-row" id="scan-time"></div>

    <a id="open-devtools-hint" class="devtools-hint">Open DevTools panel for full details →</a>
  </div>

  <script src="../shared/messaging.js"></script>
  <script src="../core/scoring.js"></script>
  <script src="../core/formatter.js"></script>
  <script src="popup.js"></script>
</body>
</html>
